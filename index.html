<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=60mm, initial-scale=1.0">
    <title>Arqueo de Caja</title>
    <style>
        body { font-family: 'Helvetica', Arial, sans-serif; width: 58mm; margin: 0 auto; padding: 2mm; font-size: 11px; color: #000; }
        .center { text-align: center; }
        .bold { font-weight: bold; }
        .line { border-top: 1px dashed #000; margin: 2mm 0; }
        table { width: 100%; border-collapse: collapse; margin: 1mm 0; }
        th { text-align: left; border-bottom: 1px solid #000; }
        .right { text-align: right; }
        .total-box { font-size: 13px; background: #f0f0f0; padding: 1mm; }
    </style>
</head>
<body>
    <div class="center bold" style="font-size: 14px;">TICKET DE ARQUEO</div>
    <div class="line"></div>
    
    <div>
        <b>Caja:</b> <span id="caja"></span><br>
        <b>Cajero:</b> <span id="cajero"></span><br>
        <b>Apertura:</b> <span id="apertura"></span><br>
        <b>Cierre:</b> <span id="cierre"></span>
    </div>

    <div class="line"></div>
    <b>DETALLE DE VENTAS:</b>
    <table>
        <thead>
            <tr>
                <th>Cant</th>
                <th>Producto</th>
                <th class="right">Total</th>
            </tr>
        </thead>
        <tbody id="tablaBody"></tbody>
    </table>

    <div class="line"></div>
    <table>
        <tr><td>SALDO INICIAL:</td><td class="right" id="sIni"></td></tr>
        <tr><td>(+) INGRESOS:</td><td class="right" id="ing"></td></tr>
        <tr><td>(-) EGRESOS:</td><td class="right" id="egr"></td></tr>
        <tr class="bold total-box"><td>TOTAL SISTEMA:</td><td class="right" id="tSis"></td></tr>
        <tr class="bold"><td>EFECTIVO FÍSICO:</td><td class="right" id="eFis"></td></tr>
        <tr class="bold"><td>DIFERENCIA:</td><td class="right" id="dif"></td></tr>
    </table>

    <div class="line"></div>
    <b>OBSERVACIONES:</b><br>
    <span id="obs"></span><br><br>
    <b>ESTADO:</b> <span id="est"></span>

    <div class="center" style="margin-top: 10mm;">
        __________________________<br>
        Firma de Responsable
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        
        // Función para formatear moneda
        const f = (v) => "$ " + parseFloat(v || 0).toLocaleString('es-CO');

        // Cargar datos básicos
        document.getElementById('caja').innerText = urlParams.get('caja');
        document.getElementById('cajero').innerText = urlParams.get('cajero');
        document.getElementById('apertura').innerText = urlParams.get('fechaApertura');
        document.getElementById('cierre').innerText = urlParams.get('fechaCierre');
        document.getElementById('sIni').innerText = f(urlParams.get('saldoInicial'));
        document.getElementById('ing').innerText = f(urlParams.get('ingresos'));
        document.getElementById('egr').innerText = f(urlParams.get('egresos'));
        document.getElementById('tSis').innerText = f(urlParams.get('totalSistema'));
        document.getElementById('eFis').innerText = f(urlParams.get('efectivoFisico'));
        document.getElementById('dif').innerText = f(urlParams.get('diferencia'));
        document.getElementById('obs').innerText = urlParams.get('observacion') || "Sin novedades";
        document.getElementById('est').innerText = urlParams.get('estado');

        // Procesar productos
        const cants = (urlParams.get('cantidades') || "").split(',');
        const prods = (urlParams.get('productos') || "").split(',');
        const prices = (urlParams.get('totales') || "").split(',');
        const tbody = document.getElementById('tablaBody');

        let agrupados = {};

        prods.forEach((nombre, i) => {
            let n = nombre.trim();
            if(n !== "") {
                let q = parseInt(cants[i] || 0);
                let p = parseFloat(prices[i] || 0);
                if(!agrupados[n]) agrupados[n] = { q: 0, t: 0 };
                agrupados[n].q += q;
                agrupados[n].t += (q * p);
            }
        });

        for (let p in agrupados) {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${agrupados[p].q}</td>
                <td>${p}</td>
                <td class="right">${f(agrupados[p].t)}</td>
            `;
            tbody.appendChild(tr);
        }

        window.onload = () => { setTimeout(() => { window.print(); }, 500); };
    </script>
</body>
</html>
