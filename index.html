<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=60mm, initial-scale=1.0">
    <title>Ticket Arqueo Corregido</title>
    <style>
        body { font-family: 'Courier New', Courier, monospace; width: 58mm; margin: 0; padding: 2mm; font-size: 11px; }
        .center { text-align: center; }
        .bold { font-weight: bold; }
        .line { border-top: 1px dashed black; margin: 2mm 0; }
        table { width: 100%; border-collapse: collapse; }
        .right { text-align: right; }
        .footer { margin-top: 10mm; text-align: center; }
    </style>
</head>
<body>
    <div class="center bold">ARQUEO DE CAJA</div>
    <div class="line"></div>
    <div id="header">
        Caja: <span id="caja"></span><br>
        Cajero: <span id="cajero"></span><br>
        Apertura: <span id="apertura"></span><br>
        Cierre: <span id="cierre"></span>
    </div>
    
    <div class="line"></div>
    <b>RESUMEN DE VENTAS</b>
    <table>
        <thead>
            <tr>
                <th style="text-align:left">Cant</th>
                <th style="text-align:left">Producto</th>
                <th class="right">Total</th>
            </tr>
        </thead>
        <tbody id="detallesBody"></tbody>
    </table>

    <div class="line"></div>
    <table>
        <tr><td>Saldo Inicial:</td><td class="right" id="sIni"></td></tr>
        <tr><td>(+) Ingresos:</td><td class="right" id="ing"></td></tr>
        <tr><td>(-) Egresos:</td><td class="right" id="egr"></td></tr>
        <tr class="bold"><td>TOTAL SISTEMA:</td><td class="right" id="tSis"></td></tr>
        <tr class="bold"><td>EFECTIVO FÍSICO:</td><td class="right" id="eFis"></td></tr>
        <tr class="line"><td></td><td></td></tr>
        <tr class="bold"><td>DIFERENCIA:</td><td class="right" id="dif"></td></tr>
    </table>

    <div class="line"></div>
    <div><b>Obs:</b> <span id="obs"></span></div>
    <div><b>Estado:</b> <span id="est"></span></div>

    <div class="footer">
        __________________________<br>
        Firma Responsable
    </div>

    <script>
        const url = new URLSearchParams(window.location.search);
        const fmt = (n) => "$ " + parseFloat(n || 0).toLocaleString('es-CO');

        // Llenar datos generales
        document.getElementById('caja').innerText = url.get('caja');
        document.getElementById('cajero').innerText = url.get('cajero');
        document.getElementById('apertura').innerText = url.get('fechaApertura');
        document.getElementById('cierre').innerText = url.get('fechaCierre');
        document.getElementById('sIni').innerText = fmt(url.get('saldoInicial'));
        document.getElementById('ing').innerText = fmt(url.get('ingresos'));
        document.getElementById('egr').innerText = fmt(url.get('egresos'));
        document.getElementById('tSis').innerText = fmt(url.get('totalSistema'));
        document.getElementById('eFis').innerText = fmt(url.get('efectivoFisico'));
        document.getElementById('dif').innerText = fmt(url.get('diferencia'));
        document.getElementById('obs').innerText = url.get('observacion') || "Sin novedades";
        document.getElementById('est').innerText = url.get('estado');

        // Procesar Listas (Cantidades, Productos, Precios)
        const cants = (url.get('cantidades') || "").split(',');
        const prods = (url.get('productos') || "").split(',');
        const prices = (url.get('totales') || "").split(',');

        const agrupados = {};

        // Recorremos las listas alineadas
        prods.forEach((nombre, i) => {
            const nom = nombre.trim();
            if (nom !== "") {
                const q = parseInt(cants[i] || 0);
                const p = parseFloat(prices[i] || 0);
                
                if (!agrupados[nom]) {
                    agrupados[nom] = { cantidad: 0, subtotal: 0 };
                }
                agrupados[nom].cantidad += q;
                agrupados[nom].subtotal += (q * p);
            }
        });

        // Dibujar la tabla
        const tbody = document.getElementById('detallesBody');
        for (const [nombre, data] of Object.entries(agrupados)) {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${data.cantidad}</td>
                <td>${nombre}</td>
                <td class="right">${fmt(data.subtotal)}</td>
            `;
            tbody.appendChild(tr);
        }

        window.onload = () => { setTimeout(() => { window.print(); }, 800); };
    </script>
</body>
</html>
