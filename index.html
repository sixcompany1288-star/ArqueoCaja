<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=60mm, initial-scale=1.0">
    <title>Ticket Arqueo Detallado</title>
    <style>
        body { font-family: 'Courier New', Courier, monospace; width: 58mm; margin: 0; padding: 2mm; font-size: 11px; color: #000; }
        .center { text-align: center; }
        .bold { font-weight: bold; }
        .line { border-top: 1px dashed black; margin: 2mm 0; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; border-bottom: 1px solid #000; }
        .right { text-align: right; }
        .footer { margin-top: 10mm; text-align: center; }
    </style>
</head>
<body>
    <div class="center bold" style="font-size: 14px;">TICKET DE ARQUEO</div>
    <div class="line"></div>
    
    <div>
        <b>Caja:</b> <span id="caja"></span><br>
        <b>Cajero:</b> <span id="cajero"></span><br>
        <b>Inicio:</b> <span id="apertura"></span><br>
        <b>Cierre:</b> <span id="cierre"></span>
    </div>

    <div class="line"></div>
    <div class="bold">DESGLOSE DE VENTAS</div>
    <table>
        <thead>
            <tr>
                <th>Cant</th>
                <th>Producto</th>
                <th class="right">Total</th>
            </tr>
        </thead>
        <tbody id="tablaBody"></tbody>
    </table>

    <div class="line"></div>
    <table>
        <tr><td>SALDO INICIAL:</td><td class="right" id="sIni"></td></tr>
        <tr><td>(+) INGRESOS:</td><td class="right" id="ing"></td></tr>
        <tr><td>(-) EGRESOS:</td><td class="right" id="egr"></td></tr>
        <tr class="bold"><td>TOTAL SISTEMA:</td><td class="right" id="tSis"></td></tr>
        <tr class="bold"><td>EFECTIVO FÍSICO:</td><td class="right" id="eFis"></td></tr>
        <tr class="bold"><td>DIFERENCIA:</td><td class="right" id="dif"></td></tr>
    </table>

    <div class="line"></div>
    <b>Observaciones:</b><br>
    <span id="obs"></span><br>
    <b>Estado:</b> <span id="est"></span>

    <div class="footer">
        __________________________<br>
        Firma Responsable
    </div>

    <script>
        const p = new URLSearchParams(window.location.search);
        const moneda = (v) => "$ " + parseFloat(v || 0).toLocaleString('es-CO');

        // Cargar Datos de Encabezado
        document.getElementById('caja').innerText = p.get('caja');
        document.getElementById('cajero').innerText = p.get('cajero');
        document.getElementById('apertura').innerText = p.get('fechaApertura');
        document.getElementById('cierre').innerText = p.get('fechaCierre');
        document.getElementById('sIni').innerText = moneda(p.get('saldoInicial'));
        document.getElementById('ing').innerText = moneda(p.get('ingresos'));
        document.getElementById('egr').innerText = moneda(p.get('egresos'));
        document.getElementById('tSis').innerText = moneda(p.get('totalSistema'));
        document.getElementById('eFis').innerText = moneda(p.get('efectivoFisico'));
        document.getElementById('dif').innerText = moneda(p.get('diferencia'));
        document.getElementById('obs').innerText = p.get('observacion') || "Sin novedades";
        document.getElementById('est').innerText = p.get('estado');

        // Procesar Listas sin agrupar
        const cants = (p.get('cantidades') || "").split(',');
        const prods = (p.get('productos') || "").split(',');
        const prices = (p.get('totales') || "").split(',');
        const tbody = document.getElementById('tablaBody');

        // Recorremos la lista de productos y creamos una fila para CADA UNO
        prods.forEach((nombre, i) => {
            let n = nombre.trim();
            if(n !== "") {
                const q = parseFloat(cants[i] || 0);
                const precio = parseFloat(prices[i] || 0);
                const subtotal = q * precio;

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${q}</td>
                    <td>${n}</td>
                    <td class="right">${moneda(subtotal)}</td>
                `;
                tbody.appendChild(tr);
            }
        });

        window.onload = () => { setTimeout(() => { window.print(); }, 800); };
    </script>
</body>
</html>
